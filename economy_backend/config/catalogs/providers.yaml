# Provider catalogs: endpoints, fixed series codes, and throttling-friendly constants.

WDI:
  base_url: "https://api.worldbank.org/v2"
  indicators:
    - NY.GDP.MKTP.KD
    - NY.GDP.MKTP.KD.ZG
    - NY.GDP.PCAP.KD
    - FP.CPI.TOTL.ZG
    - SL.UEM.TOTL.ZS
    - BN.CAB.XOKA.GD.ZS
    - BN.CAB.XOKA.CD
    - FI.RES.TOTL.MO
    - DT.DOD.DECT.CD
    - DT.DOD.DSTC.ZS
    - FS.AST.PRVT.GD.ZS
    - NE.TRD.GNFS.ZS
    - GC.DOD.TOTL.GD.ZS
    - SP.POP.TOTL
    - NV.AGR.TOTL.ZS
    - NV.IND.TOTL.ZS
    - NV.SRV.TOTL.ZS

IMF:
  # IMF data via sdmx1 client using IMF_DATA source
  # Uses sdmx.Client("IMF_DATA") with dataflow codes
  base_url: "https://api.imf.org/external/sdmx/2.1"
  datasets:
    CPI:
      # Consumer Price Index dataflow
      # Key format: {COUNTRY}+{COUNTRY2}...
      canonical_indicator: "IMF_CPI_INDEX"
      key_suffix: ""
    
    # International Financial Statistics (IFS) - Key Economic Indicators
    PCPI:
      # Consumer Prices, Index (2010=100)
      canonical_indicator: "IMF_CPI_2010"
      key_suffix: ""
    
    PCPIPCH:
      # Inflation, average consumer prices (Annual percent change)
      canonical_indicator: "IMF_INFLATION_PCT"
      key_suffix: ""
    
    NGDP:
      # Gross Domestic Product, current prices (National currency)
      canonical_indicator: "IMF_GDP_CURRENT"
      key_suffix: ""
    
    NGDP_R:
      # Gross Domestic Product, constant prices (Index)
      canonical_indicator: "IMF_GDP_REAL_INDEX"
      key_suffix: ""
    
    NGDPRPPPPC:
      # GDP per capita, Purchasing Power Parity (Current international dollar)
      canonical_indicator: "IMF_GDP_PER_CAPITA_PPP"
      key_suffix: ""
    
    # Balance of Payments
    BCA:
      # Current Account Balance (USD billions)
      canonical_indicator: "IMF_CURRENT_ACCOUNT"
      key_suffix: ""
    
    BCA_NGDPD:
      # Current Account Balance (Percent of GDP)
      canonical_indicator: "IMF_CURRENT_ACCOUNT_PCT_GDP"
      key_suffix: ""
    
    # Monetary & Financial
    FM:
      # Money Supply M2 (National currency)
      canonical_indicator: "IMF_M2"
      key_suffix: ""
    
    FPOLM:
      # Monetary Policy Rate (Percent per annum)
      canonical_indicator: "IMF_POLICY_RATE"
      key_suffix: ""
    
    FILR:
      # Lending Rate (Percent per annum)
      canonical_indicator: "IMF_LENDING_RATE"
      key_suffix: ""
    
    # External Sector
    ENDA:
      # External Debt (USD billions)
      canonical_indicator: "IMF_EXTERNAL_DEBT"
      key_suffix: ""
    
    ENDA_NGDPD:
      # External Debt (Percent of GDP)
      canonical_indicator: "IMF_EXTERNAL_DEBT_PCT_GDP"
      key_suffix: ""
    
    # Fiscal (Government Finance)
    GGR:
      # General Government Revenue (National currency)
      canonical_indicator: "IMF_GOVT_REVENUE"
      key_suffix: ""
    
    GGXCNL:
      # General Government Net Lending/Borrowing (National currency)
      canonical_indicator: "IMF_GOVT_BALANCE"
      key_suffix: ""
    
    GGXWDG:
      # General Government Gross Debt (National currency)
      canonical_indicator: "IMF_GOVT_DEBT"
      key_suffix: ""
    
    GGXWDG_NGDP:
      # General Government Gross Debt (Percent of GDP)
      canonical_indicator: "IMF_GOVT_DEBT_PCT_GDP"
      key_suffix: ""
    
    # Trade & Reserves
    TX:
      # Exports of goods and services (National currency)
      canonical_indicator: "IMF_EXPORTS"
      key_suffix: ""
    
    TM:
      # Imports of goods and services (National currency)
      canonical_indicator: "IMF_IMPORTS"
      key_suffix: ""
    
    FDIR:
      # Total Reserves (USD billions)
      canonical_indicator: "IMF_RESERVES_TOTAL"
      key_suffix: ""
    
    FIDR:
      # Reserves in months of imports
      canonical_indicator: "IMF_RESERVES_MONTHS_IMPORTS"
      key_suffix: ""
    
    # Exchange Rates
    ENDA_XDC_USD:
      # National Currency per US Dollar, period average
      canonical_indicator: "IMF_FX_RATE_USD"
      key_suffix: ""
    
    # Employment
    LUR:
      # Unemployment rate (Percent of total labor force)
      canonical_indicator: "IMF_UNEMPLOYMENT_RATE"
      key_suffix: ""

OECD:
  base_url: "https://sdmx.oecd.org/public/api/v1/en/data"
  dataflows:
    DP_LIVE:
      measures:
        GDP_PER_CAPITA: "GDP"
        UNEMPLOYMENT_RATE: "UNEMP"
        INFLATION_CPI: "CPI"
      frequency: "A"
    MEI:
      measures:
        CPI_ALL_ITEMS: "CPALTT01"
        INDUSTRIAL_PRODUCTION: "PRINTO01"
        CLI: "LOLITOAA"
      frequency: "M"
    QNA:
      measures:
        GDP_VOLUME: "B1_GE"
      frequency: "Q"

EUROSTAT:
  base_url: "https://ec.europa.eu/eurostat/api/dissemination/statistics/1.0/data"
  datasets:
    namq_10_gdp:
      description: "Quarterly GDP at market prices"
      params:
        unit: "CLV10_MEUR"
        s_adj: "SCA"
        na_item: "B1GQ"
    sts_inpr_q:
      description: "Quarterly industrial production index"
      params:
        indic_bt: "PROD"
        s_adj: "SA"
        nace_r2: "B-D"
    une_rt_q:
      description: "Quarterly unemployment rate"
      params:
        age: "Y15-74"
        sex: "T"
        unit: "PC_ACT"
    prc_hicp_manr:
      description: "Monthly/quarterly HICP inflation rate"
      params:
        coicop: "CP00"
        unit: "RCH_A"

ONS:
  base_url: "https://www.ons.gov.uk/economy/inflationandpriceindices/timeseries"
  series:
    UK_GDP_VOL_Q:
      cdid: "IHYQ"
      dataset: "qna"
      description: "GDP quarter on quarter growth"
    UK_CPIH_INDEX:
      cdid: "L522"
      dataset: "mm23"
      description: "CPIH all items 12-month rate"
    UK_UNEMP_RATE:
      cdid: "MGSX"
      dataset: "lms"
      description: "Unemployment rate aged 16+"
    UK_HPI:
      cdid: "HOXM"
      dataset: "hpi"
      description: "UK House Price Index"

