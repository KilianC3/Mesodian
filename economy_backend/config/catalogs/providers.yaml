COMTRADE:
  base_url: "https://comtradeapi.un.org/public/v1/preview"
  # API key can be set via environment variable: COMTRADE_API_KEY
  # No key in config file for security - use .env or environment
  # Note: API v1 requires numeric reporter codes (not ISO3) and text flow codes
  flows:
    - "M"  # imports (was 1)
    - "X"  # exports (was 2)
  hs_codes:
    - "2709"  # crude oil
    - "2710"  # petroleum oils
    - "2711"  # petroleum gases
    - "2701"  # coal
    - "2702"  # lignite
    - "2601"  # iron ores
    - "2606"  # aluminum ores
    - "2603"  # copper ores
    - "1001"  # wheat
    - "1005"  # maize/corn
    - "1006"  # rice
    - "1201"  # soybeans
    - "1511"  # palm oil
    - "1205"  # rapeseeds
    - "8703"  # motor cars
    - "8500"  # placeholder for electronics set; expand with specific 85xx codes
  partner_code: "0"  # 0 = world
  throttle:
    max_parallel_requests: 1
    per_request_sleep_seconds: 1.0

EIA:
  base_url: "https://api.eia.gov/v2"
  series_ids:
