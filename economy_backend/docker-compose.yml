version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: economy
      POSTGRES_PASSWORD: economy
      POSTGRES_DB: economy_dev
    ports:
      - "5433:5432"
    volumes:
      - economy_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://economy:economy@postgres:5432/economy_dev
      APP_NAME: Economy Analytics API
      ENV: dev
      DEBUG: "false"
      FRED_API_KEY: ${FRED_API_KEY:-changeme}
      EIA_API_KEY: ${EIA_API_KEY:-changeme}
      COMTRADE_API_KEY: ${COMTRADE_API_KEY:-changeme}
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-changeme}
    working_dir: /app
    depends_on:
      - postgres
    command: bash
    tty: true

volumes:
  economy_pgdata:
